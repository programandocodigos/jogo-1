<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Fight 3D | Humanoid Bot Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>
</head>

<body>
    <div id="game-container">
        <div id="crosshair"></div>
        <header id="hud" class="glass">
            <div id="game-title">BOX FIGHT 3D</div>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">SANGUE</span>
                    <div class="health-bar">
                        <div id="player-health-fill" class="health-fill"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="label">BOT</span>
                    <div class="health-bar bot-health">
                        <div id="bot-health-fill" class="health-fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="start-overlay" class="overlay">
            <div class="content glass">
                <h1>FPS 3D REAL</h1>
                <p>Controles: WASD para andar, Mouse para olhar e atirar.</p>
                <button id="start-btn" class="glow-btn">INICIAR COMBATE</button>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <h1 class="blood-text">VOCÊ MORREU</h1>
            <button id="retry-btn" class="glow-btn">REENTRAR</button>
        </div>
    </div>
    <script type="module" src="game.js"></script>
</body>

</html>
