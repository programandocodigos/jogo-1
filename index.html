<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Fight 3D | Meme 67 Edition</title>
    <!-- CSS INTEGRADO -->
    <style>
        :root {
            --bg-dark: #020205;
            --primary: #fbbf24;
            --primary-glow: rgba(251, 191, 36, 0.4);
            --secondary: #ff00ff;
            --blood: #8B0000;
            --text: #f8fafc;
            --glass: rgba(10, 10, 15, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 50;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .health-bar {
            width: 180px;
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff5555);
            transition: width 0.3s;
        }

        .coin-value {
            font-size: 1.4rem;
            color: #ffd700;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .ammo-hud {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: 900;
        }

        /* Bot HUD */
        #bot-hud {
            position: absolute;
            top: 100px;
            right: 20px;
            background: var(--glass);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 255, 0.3);
            display: none;
            z-index: 40;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .glow-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .glow-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
        }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- HUD -->
        <header id="hud" class="glass">
            <div>
                <span class="label">SANGUE JOGADOR</span>
                <div class="health-bar">
                    <div id="player-health-fill" class="health-fill"></div>
                </div>
                <div style="margin-top: 10px;">💰 Moedas: <span id="coin-count" class="coin-value">0</span></div>
            </div>
            <div class="stat-item" style="align-items: flex-end;">
                <span class="label">MUNIÇÃO</span>
                <div class="ammo-hud"><span id="ammo-count">10</span>/30</div>
            </div>
        </header>

        <!-- Bot HUD -->
        <div id="bot-hud">
            <span class="label" style="color: #ff00ff;">BOT HP</span>
            <div class="health-bar" style="width: 150px;">
                <div id="bot-health-fill" class="health-fill" style="background: #ff00ff;"></div>
            </div>
        </div>

        <div id="crosshair"></div>

        <!-- Overlays -->
        <div id="start-overlay" class="overlay">
            <div>
                <h1 style="font-size: 3.5rem; color: #fbbf24;">BOX FIGHT 3D</h1>
                <p style="margin: 20px 0; opacity: 0.7;">WASD para Correr | Mouse para Atirar | Tecla 2 Rifle</p>
                <button id="start-btn" class="glow-btn">ENTRAR NA ARENA</button>
            </div>
        </div>

        <div id="victory-overlay" class="overlay hidden">
            <div>
                <h1 style="color: #ffd700; font-size: 4rem;">VITÓRIA!</h1>
                <p>+60 Moedas Recebidas</p>
                <button class="glow-btn" onclick="location.reload()" style="margin-top: 20px;">PRÓXIMA FASE</button>
            </div>
        </div>
    </div>

    <!-- LOGICA INTEGRADA -->
    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIG ---
        const STATS = {
            PLAYER: {
                HP: 100, SPEED: 0.16, RELOAD: 2500,
                WEAPONS: {
                    MAGNUM: { DMG: 30, MAG: 10, RATE: 400, AUTO: false, SFX: 'https://cdn.pixabay.com/audio/2022/03/10/audio_783d10a102.mp3' },
                    RIFLE: { DMG: 18, MAG: 20, RATE: 100, AUTO: true, SFX: 'https://cdn.pixabay.com/audio/2022/03/24/audio_349d97f904.mp3' }
                }
            },
            BOT: { HP: 100, DMG: 40, SPEED: 0.08, ACCURACY: 0.6 }
        };

        // --- STATE ---
        let gameState = 'START', coins = 0, playerHp = 100;
        let weapon = 'MAGNUM', ammo = 10, isMouseDown = false;
        let lastShot = 0, bots = [], obstacles = [], obstacleBoxes = [];
        const keys = {};

        // --- ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const recoilGroup = new THREE.Group();
        camera.add(recoilGroup); scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);

        // LUZES (CRÍTICO)
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // MAPA
        function initMap() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ color: 0x1a3a1a }));
            floor.rotation.x = -Math.PI / 2; scene.add(floor);

            for (let i = 0; i < 20; i++) {
                const rock = new THREE.Mesh(new THREE.BoxGeometry(3, 6, 3), new THREE.MeshStandardMaterial({ color: 0x444444 }));
                rock.position.set((Math.random() - 0.5) * 100, 3, (Math.random() - 0.5) * 100);
                if (rock.position.distanceTo(new THREE.Vector3(0, 0, 10)) < 8) rock.position.x += 15;
                scene.add(rock);
                obstacles.push(rock);
                obstacleBoxes.push(new THREE.Box3().setFromObject(rock));
            }
        }

        // ARMA
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.7), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        gun.position.set(0.4, -0.3, -0.6);
        recoilGroup.add(gun);

        // BOT
        class Bot {
            constructor() {
                this.mesh = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                body.position.y = 0.9; this.mesh.add(body);
                scene.add(this.mesh);
                this.hp = 100; this.lastShot = 0;
                this.reset();
            }
            reset() {
                this.mesh.position.set((Math.random() - 0.5) * 40, 0, (Math.random() - 0.5) * 40 - 20);
                this.mesh.visible = true; this.hp = 100;
                document.getElementById('bot-hud').style.display = 'block';
            }
            update() {
                if (!this.mesh.visible || gameState !== 'PLAYING') return;
                this.mesh.lookAt(camera.position.x, 0, camera.position.z);
                const dist = this.mesh.position.distanceTo(camera.position);

                if (dist > 7) {
                    const dir = new THREE.Vector3().subVectors(camera.position, this.mesh.position).normalize();
                    this.mesh.position.add(new THREE.Vector3(dir.x, 0, dir.z).multiplyScalar(STATS.BOT.SPEED));
                }

                if (Date.now() - this.lastShot > 1800) {
                    this.lastShot = Date.now();
                    if (Math.random() < STATS.BOT.ACCURACY) {
                        playerHp -= STATS.BOT.DMG;
                        updateHUD();
                        if (playerHp <= 0) location.reload();
                    }
                }
            }
        }

        // TIRO
        function shoot() {
            if (gameState !== 'PLAYING' || ammo <= 0) return;
            const w = STATS.PLAYER.WEAPONS[weapon];
            if (Date.now() - lastShot < w.RATE) return;

            lastShot = Date.now(); ammo--; updateHUD();
            new Audio(w.SFX).play().catch(() => { });

            // Recoil
            gun.position.z += 0.1; setTimeout(() => gun.position.z = -0.6, 50);

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const obsHits = ray.intersectObjects(obstacles);
            const obsDist = obsHits.length > 0 ? obsHits[0].distance : Infinity;

            bots.forEach(b => {
                if (b.mesh.visible) {
                    const hit = ray.intersectObject(b.mesh, true);
                    if (hit.length > 0 && hit[0].distance < obsDist) {
                        b.hp -= w.DMG;
                        document.getElementById('bot-health-fill').style.width = b.hp + '%';
                        if (b.hp <= 0) {
                            b.mesh.visible = false; coins += 60;
                            updateHUD();
                            document.getElementById('victory-overlay').classList.remove('hidden');
                            controls.unlock();
                        }
                    }
                }
            });
        }

        function updateHUD() {
            document.getElementById('player-health-fill').style.width = Math.max(0, playerHp) + '%';
            document.getElementById('coin-count').innerText = coins;
            document.getElementById('ammo-count').innerText = ammo;
        }

        function loop() {
            requestAnimationFrame(loop);
            if (gameState === 'PLAYING') {
                const mv = new THREE.Vector3();
                const f = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const r = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                f.y = 0; r.y = 0; f.normalize(); r.normalize();

                if (keys['KeyW']) mv.add(f); if (keys['KeyS']) mv.sub(f);
                if (keys['KeyA']) mv.sub(r); if (keys['KeyD']) mv.add(r);

                if (mv.length() > 0) {
                    const next = camera.position.clone().add(mv.normalize().multiplyScalar(STATS.PLAYER.SPEED));
                    const pBox = new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(1, 2, 1));
                    if (!obstacleBoxes.some(b => b.intersectsBox(pBox))) camera.position.copy(next);
                }

                if (isMouseDown && STATS.PLAYER.WEAPONS[weapon].AUTO) shoot();
                bots.forEach(b => b.update());
            }
            renderer.render(scene, camera);
        }

        // INPUTS
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Digit1') { weapon = 'MAGNUM'; ammo = 10; updateHUD(); }
            if (e.code === 'Digit2') { weapon = 'RIFLE'; ammo = 20; updateHUD(); }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { isMouseDown = true; shoot(); });
        window.addEventListener('mouseup', () => isMouseDown = false);

        document.getElementById('start-btn').onclick = () => {
            gameState = 'PLAYING';
            document.getElementById('start-overlay').classList.add('hidden');
            camera.position.set(0, 1.7, 10);
            controls.lock();
            if (bots.length === 0) bots.push(new Bot());
        };

        initMap();
        loop();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
