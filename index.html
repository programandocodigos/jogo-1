<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Fight 3D | Ultimate Edition</title>
    <style>
        :root {
            --bg-dark: #020205;
            --primary: #fbbf24;
            --blood: #e11d48;
            --magenta: #d946ef;
            --text: #f8fafc;
            --glass: rgba(10, 10, 15, 0.8);
            --font-outfit: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: var(--font-outfit);
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* HUD JOGADOR (ESQUERDA) */
        #player-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: var(--glass);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* HUD INIMIGO (DIREITA) */
        #bot-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: var(--glass);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: none;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .health-bar {
            width: 220px;
            height: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .health-fill {
            width: 100%;
            height: 100%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #player-health-fill {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        #bot-health-fill {
            background: linear-gradient(90deg, var(--magenta), #a21caf);
        }

        .coin-counter {
            margin-top: 10px;
            font-size: 1.4rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        /* MUNIÇÃO (DIREITA INFERIOR) */
        #ammo-hud {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
            z-index: 50;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
        }

        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .content {
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--glass);
            backdrop-filter: blur(20px);
        }

        .glow-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }

        #reload-msg {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 1.5rem;
            font-weight: 900;
            display: none;
            z-index: 150;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- HUD ESQUERDA -->
        <div id="player-hud">
            <div class="label">SANGUE JOGADOR</div>
            <div class="health-bar">
                <div id="player-health-fill" class="health-fill"></div>
            </div>
            <div id="coin-counter" class="coin-counter">💰 Moedas: 0</div>
        </div>

        <!-- HUD DIREITA -->
        <div id="bot-hud">
            <div class="label" style="color: var(--magenta)">SANGUE INIMIGO</div>
            <div class="health-bar">
                <div id="bot-health-fill" class="health-fill"></div>
            </div>
        </div>

        <!-- HUD MUNIÇÃO -->
        <div id="ammo-hud">10/30</div>
        <div id="reload-msg">RECARREGANDO...</div>
        <div id="crosshair"></div>

        <!-- OVERLAYS -->
        <div id="start-overlay" class="overlay">
            <div class="content">
                <h1 style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;">BOX FIGHT 3D</h1>
                <p>WASD: Mover | Mouse: Atirar | 2: Rifle</p>
                <button id="start-btn" class="glow-btn">ENTRAR NA ARENA</button>
            </div>
        </div>

        <div id="victory-overlay" class="overlay hidden">
            <div class="content">
                <h1 style="color: #ffd700; font-size: 3rem;">VITÓRIA!</h1>
                <p>+60 Moedas conquistadas.</p>
                <button onclick="location.reload()" class="glow-btn">PRÓXIMA FASE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- SETUP ---
        const WEAPONS = {
            MAGNUM: { dmg: 30, mag: 10, reserve: 30, rate: 450, auto: false, color: 0x444444, sfx: 'https://cdn.pixabay.com/audio/2022/03/10/audio_783d10a102.mp3' },
            RIFLE: { dmg: 18, mag: 20, reserve: 80, rate: 100, auto: true, color: 0x1a2e1a, sfx: 'https://cdn.pixabay.com/audio/2022/03/24/audio_349d97f904.mp3' }
        };

        let gameState = 'START', coins = 0, playerHp = 100, botHp = 100;
        let weapon = 'MAGNUM', ammo = 10, reserve = 30;
        let isMouseDown = false, lastShot = 0, isReloading = false;
        let bots = [], obstacleBoxes = [];
        const keys = {};

        // --- ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10); sun.castShadow = true; scene.add(sun);

        // SOLO
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x1a3a1a }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        // MAPA
        function initMap() {
            obstacleBoxes = [];
            for (let i = 0; i < 25; i++) {
                const x = (Math.random() - 0.5) * 120, z = (Math.random() - 0.5) * 120;
                if (Math.abs(x) < 8 && Math.abs(z - 10) < 8) continue;

                const h = 4 + Math.random() * 4;
                const rock = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                rock.position.set(x, h / 2, z); rock.castShadow = true; rock.receiveShadow = true;
                scene.add(rock);
                obstacleBoxes.push(new THREE.Box3().setFromObject(rock));
            }
        }

        // VIEWMODEL
        const viewModel = new THREE.Group();
        camera.add(viewModel);
        function initGun() {
            viewModel.clear();
            const w = WEAPONS[weapon];
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
            arm.position.set(0.6, -0.4, -0.5); viewModel.add(arm);
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, weapon === 'MAGNUM' ? 0.5 : 1), new THREE.MeshStandardMaterial({ color: w.color, metalness: 0.8 }));
            barrel.position.set(0.6, -0.25, -1); viewModel.add(barrel);
        }

        // --- HUMANOIDE (GROUNDED) ---
        class Bot {
            constructor() {
                this.group = new THREE.Group();
                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.35), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                torso.position.y = 1.4;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
                head.position.y = 2.1;
                const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                lLeg.position.set(-0.2, 0.45, 0);
                const rLeg = lLeg.clone(); rLeg.position.x = 0.2;

                this.arm = new THREE.Group();
                const aMesh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
                const gMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.5), new THREE.MeshBasicMaterial({ color: 0 }));
                aMesh.position.y = -0.4; gMesh.position.set(0, -0.7, 0.2);
                this.arm.add(aMesh, gMesh); this.arm.position.set(0.4, 1.8, 0);

                this.group.add(torso, head, lLeg, rLeg, this.arm);
                scene.add(this.group);
                this.group.position.set(5, 0, -15); // PÉS NO CHÃO (y=0)
                this.lastShot = 0;
            }
            update() {
                if (botHp <= 0 || gameState !== 'PLAYING') return;
                this.group.lookAt(camera.position.x, 0, camera.position.z);
                this.arm.lookAt(camera.position); this.arm.rotation.x += Math.PI / 2;

                const dist = this.group.position.distanceTo(camera.position);
                const dir = new THREE.Vector3().subVectors(camera.position, this.group.position).normalize();

                // Movimento Strafe
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), dir).normalize();
                this.group.position.add(dir.multiplyScalar(dist > 8 ? 0.08 : 0)).add(side.multiplyScalar(Math.sin(Date.now() * 0.002) * 0.05));
                this.group.position.y = 0; // Travado no chão

                // Tiro do Bot
                if (Date.now() - this.lastShot > 1800) {
                    this.lastShot = Date.now();
                    if (Math.random() > 0.4) { // 60% Acerto (40% Erro)
                        playerHp -= 40; updateHUD();
                        if (playerHp <= 0) location.reload();
                    }
                }
            }
        }

        // --- MECANICAS ---
        function shoot() {
            if (isReloading || gameState !== 'PLAYING' || ammo <= 0) return;
            const w = WEAPONS[weapon];
            if (Date.now() - lastShot < w.rate) return;
            lastShot = Date.now(); ammo--; updateHUD();
            new Audio(w.sfx).play().catch(() => { });

            // Recoil
            viewModel.position.z += 0.15; setTimeout(() => viewModel.position.z = 0, 50);

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(scene.children, true).filter(h => h.object.parent !== camera);
            const wallDist = hits.find(h => obstacleBoxes.some(box => box.containsPoint(h.point)))?.distance || Infinity;

            if (bots[0] && ray.intersectObject(bots[0].group, true).length > 0) {
                const hitDist = ray.intersectObject(bots[0].group, true)[0].distance;
                if (hitDist < wallDist) {
                    botHp -= 30; updateHUD();
                    if (botHp <= 0) {
                        scene.remove(bots[0].group);
                        coins += 60; updateHUD();
                        document.getElementById('victory-overlay').classList.remove('hidden');
                        controls.unlock();
                        new Audio('https://www.myinstants.com/media/sounds/dally-trend.mp3').play().catch(() => { });
                    }
                }
            }
        }

        function updateHUD() {
            document.getElementById('player-health-fill').style.width = Math.max(0, playerHp) + '%';
            document.getElementById('bot-health-fill').style.width = Math.max(0, botHp) + '%';
            document.getElementById('bot-hud').style.display = botHp > 0 ? 'block' : 'none';
            document.getElementById('coin-count').innerText = `💰 Moedas: ${coins}`;
            document.getElementById('ammo-hud').innerText = `${ammo}/${reserve}`;
            // Cor da barra de vida
            const fill = document.getElementById('player-health-fill');
            fill.style.background = playerHp > 40 ? 'linear-gradient(90deg, #22c55e, #16a34a)' : 'linear-gradient(90deg, #ef4444, #b91c1c)';
        }

        function loop() {
            requestAnimationFrame(loop);
            if (gameState === 'PLAYING') {
                const mv = new THREE.Vector3();
                const f = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const r = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                f.y = 0; r.y = 0; f.normalize(); r.normalize();
                if (keys['KeyW']) mv.add(f); if (keys['KeyS']) mv.sub(f);
                if (keys['KeyA']) mv.sub(r); if (keys['KeyD']) mv.add(r);
                if (mv.length() > 0) camera.position.add(mv.normalize().multiplyScalar(0.15));

                if (isMouseDown && WEAPONS[weapon].auto) shoot();
                if (bots[0]) bots[0].update();
                viewModel.position.y = Math.sin(Date.now() * 0.005) * 0.01;
            }
            renderer.render(scene, camera);
        }

        window.onkeydown = e => {
            keys[e.code] = true;
            if (e.code === 'Digit2' && coins >= 50) { weapon = 'RIFLE'; ammo = 20; reserve = 80; initGun(); updateHUD(); }
        };
        window.onkeyup = e => keys[e.code] = false;
        window.onmousedown = () => { isMouseDown = true; shoot(); };
        window.onmouseup = () => isMouseDown = false;

        document.getElementById('start-btn').onclick = () => {
            gameState = 'PLAYING'; document.getElementById('start-overlay').classList.add('hidden');
            camera.position.set(0, 1.7, 10); controls.lock();
            if (bots.length === 0) bots.push(new Bot());
            updateHUD();
        };

        initMap(); initGun(); loop();
    </script>
</body>

</html>
