<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Fight 3D | Hardcore Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Nosifer&display=swap"
        rel="stylesheet">
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- HUD Principal -->
        <header id="hud" class="glass">
            <div id="game-title">HARDCORE ARENA</div>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">SANGUE JOGADOR</span>
                    <div class="health-bar">
                        <div id="player-health-fill" class="health-fill"></div>
                    </div>
                </div>
                <div class="stat-item ammo-hud">
                    <span id="ammo-count">10</span> / <span id="total-ammo">20</span>
                </div>
                <div class="stat-item">
                    <span class="label">SANGUE BOT</span>
                    <div class="health-bar bot-health">
                        <div id="bot-health-fill" class="health-fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Mira -->
        <div id="crosshair"></div>

        <!-- Overlays de Estado -->
        <div id="start-overlay" class="overlay">
            <div class="content glass">
                <h1>BOX FIGHT 3D</h1>
                <p>Mire na cabeça. Sobreviva aos disparos.</p>
                <button id="start-btn" class="glow-btn">ENTRAR NA ARENA</button>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <h1 class="blood-text">GAME OVER</h1>
            <div class="blood-drip"></div>
            <button id="retry-btn" class="glow-btn">REENTRAR</button>
        </div>

        <div id="victory-overlay" class="overlay hidden">
            <div class="content no-bg">
                <h2 class="victory-text animate-bounce">VITÓRIA!</h2>
                <p>Executando Dally...</p>
                <div id="countdown">3</div>
            </div>
        </div>

        <!-- Áudio para a Vitória -->
        <audio id="victory-music" loop>
            <source src="assets/dally.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Scripts -->
    <script type="module" src="game.js"></script>
</body>

</html>
