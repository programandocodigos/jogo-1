<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Fight 3D | Hardcore Edition</title>
    <style>
        :root {
            --bg-dark: #020205;
            --primary: #fbbf24;
            --primary-glow: rgba(251, 191, 36, 0.4);
            --blood: #8B0000;
            --text: #f8fafc;
            --glass: rgba(10, 10, 15, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* HUD Principal */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 50;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .health-bar {
            width: 180px;
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff5555);
            transition: width 0.3s;
        }

        .coin-value {
            font-size: 1.4rem;
            color: #ffd700;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .ammo-hud {
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 900;
            font-family: monospace;
        }

        /* Bot HUD (Top Right) */
        #bot-hud {
            position: absolute;
            top: 100px;
            right: 20px;
            background: var(--glass);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 255, 0.3);
            display: none;
            z-index: 40;
        }

        .bot-health-fill {
            background: linear-gradient(90deg, #ff00ff, #8800ff);
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
        }

        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .content {
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--glass);
            backdrop-filter: blur(20px);
        }

        h1 {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .glow-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .glow-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--primary);
        }

        .shop-btn {
            background: #10b981;
            margin-top: 10px;
        }

        .blood-text {
            color: var(--blood);
            font-size: 4rem;
            font-weight: 900;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>
    <div id="game-container">
        <header id="hud" class="glass">
            <div>
                <span class="label">SANGUE JOGADOR</span>
                <div class="health-bar">
                    <div id="player-health-fill" class="health-fill"></div>
                </div>
                <div style="margin-top: 10px;">💰 Moedas: <span id="coin-count" class="coin-value">0</span></div>
            </div>
            <div class="stat-item" style="align-items: flex-end;">
                <span class="label">MUNIÇÃO</span>
                <div class="ammo-hud"><span id="ammo-count">10</span>/<span id="reserve-display">30</span></div>
                <div id="reload-msg" style="color: #ff4444; font-size: 0.7rem; font-weight: 900; height: 12px;"></div>
            </div>
        </header>

        <div id="bot-hud">
            <span class="label" style="color: #ff4444;">HUMANOIDE HP</span>
            <div class="health-bar" style="width: 150px;">
                <div id="bot-health-fill" class="health-fill bot-health-fill"></div>
            </div>
        </div>

        <div id="crosshair"></div>

        <!-- Overlays -->
        <div id="start-overlay" class="overlay">
            <div class="content">
                <h1>BOX FIGHT 3D</h1>
                <p style="margin-bottom: 25px; opacity: 0.8;">Mova-se com WASD, Atire com Mouse.<br>Teclas 1 e 2 trocam
                    armas.</p>
                <button id="start-btn" class="glow-btn">ENTRAR NA ARENA</button>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <div class="content">
                <h1 class="blood-text">DERROTADO</h1>
                <button onclick="location.reload()" class="glow-btn">REENTRAR</button>
            </div>
        </div>

        <div id="victory-overlay" class="overlay hidden">
            <div class="content">
                <h1 style="color: #ffd700;">VITÓRIA!</h1>
                <p>+60 Moedas conquistadas.</p>
                <button id="shop-btn" class="glow-btn shop-btn">LOJA: COMPRAR RIFLE (50)</button>
                <button onclick="location.reload()" class="glow-btn"
                    style="display: block; width: 100%; background: #4b5563;">PRÓXIMA FASE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIGURAÇÕES ---
        const STATS = {
            PLAYER: {
                HP: 100, SPEED: 0.16, RELOAD_TIME: 2500,
                WEAPONS: {
                    MAGNUM: { DAMAGE: 30, MAG: 10, RESERVE: 30, RATE: 400, AUTO: false, COLOR: 0x555555 },
                    RIFLE: { DAMAGE: 18, MAG: 20, RESERVE: 60, RATE: 100, AUTO: true, COLOR: 0x223322 }
                }
            },
            BOT: { HP: 100, DAMAGE: 40, SPEED: 0.08, ACCURACY: 0.6, STOP_DIST: 8 }
        };

        // --- ESTADO ---
        let gameState = 'START', coins = 0, playerHp = 100;
        let weapon = 'MAGNUM', ammo = 10, reserve = 30, isMouseDown = false;
        let lastShot = 0, isReloading = false, bots = [], obstacleBoxes = [];
        const keys = {};

        // --- MOTOR ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const recoilGroup = new THREE.Group();
        camera.add(recoilGroup); scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);

        // ILUMINAÇÃO
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10); sun.castShadow = true;
        scene.add(sun);

        // --- VIEWMODEL (ARMA E BRAÇO) ---
        const weaponGroup = new THREE.Group();
        recoilGroup.add(weaponGroup);

        function updateWeaponModel() {
            weaponGroup.clear();
            const w = STATS.PLAYER.WEAPONS[weapon];

            // Braço (Pele)
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1.2), new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
            arm.position.set(0.6, -0.4, -0.6);
            weaponGroup.add(arm);

            // Arma (Metálico)
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, weapon === 'MAGNUM' ? 0.5 : 0.9), new THREE.MeshStandardMaterial({ color: w.COLOR, metalness: 0.9 }));
            body.position.set(0.6, -0.2, -1.0);

            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.15), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
            handle.position.set(0.6, -0.4, -0.85); handle.rotation.x = 0.3;

            weaponGroup.add(body, handle);
        }

        // --- MAPA ---
        function initMap() {
            // Solo
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x1a3a1a }));
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

            const addObj = (mesh, x, z) => {
                mesh.position.set(x, mesh.geometry.parameters.height / 2, z);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh);
                obstacleBoxes.push(new THREE.Box3().setFromObject(mesh));
            };

            // Pedras e Árvores
            for (let i = 0; i < 25; i++) {
                const x = (Math.random() - 0.5) * 120, z = (Math.random() - 0.5) * 120;
                if (Math.abs(x) < 8 && Math.abs(z - 12) < 8) continue;

                if (Math.random() > 0.5) {
                    const h = 4 + Math.random() * 5;
                    const rock = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                    addObj(rock, x, z);
                } else {
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 6), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 8, 8), new THREE.MeshStandardMaterial({ color: 0x0a5d0a }));
                    trunk.position.y = 3; leaves.position.y = 7;
                    tree.add(trunk, leaves);
                    tree.position.set(x, 0, z); scene.add(tree);
                    obstacleBoxes.push(new THREE.Box3().setFromObject(tree));
                }
            }
        }

        // --- BOT HUMANOIDE ---
        class Bot {
            constructor() {
                this.group = new THREE.Group();
                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.0, 0.35), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                torso.position.y = 1.4;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
                head.position.y = 2.15;
                const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.9, 0.24), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                lLeg.position.set(-0.2, 0.45, 0);
                const rLeg = lLeg.clone(); rLeg.position.x = 0.2;

                this.arm = new THREE.Group();
                const armMesh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
                const botGun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.6), new THREE.MeshBasicMaterial({ color: 0x000 }));
                armMesh.position.y = -0.4; botGun.position.set(0, -0.7, 0.2);
                this.arm.add(armMesh, botGun); this.arm.position.set(0.4, 1.8, 0);

                this.group.add(torso, head, lLeg, rLeg, this.arm);
                scene.add(this.group);
                this.hp = 100; this.lastShot = 0;
                this.respawn();
            }
            respawn() {
                this.hp = 100; this.group.visible = true;
                this.group.position.set((Math.random() - 0.5) * 50, 0, (Math.random() - 0.5) * 40 - 25);
                document.getElementById('bot-hud').style.display = 'block';
                document.getElementById('bot-health-fill').style.width = '100%';
            }
            update() {
                if (!this.group.visible || gameState !== 'PLAYING') return;

                this.group.lookAt(camera.position.x, 0, camera.position.z);
                this.arm.lookAt(camera.position); this.arm.rotation.x += Math.PI / 2;

                const dist = this.group.position.distanceTo(camera.position);
                const dir = new THREE.Vector3().subVectors(camera.position, this.group.position).normalize();

                // Movimento Strafe
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), dir).normalize();
                const strafe = side.multiplyScalar(Math.sin(Date.now() * 0.002) * 0.05);
                const forward = dir.multiplyScalar(dist > STATS.BOT.STOP_DIST ? STATS.BOT.SPEED : 0);
                this.group.position.add(forward).add(strafe);

                // Tiro do Bot
                if (Date.now() - this.lastShot > 1600) {
                    this.lastShot = Date.now();
                    if (Math.random() < STATS.BOT.ACCURACY) {
                        playerHp -= STATS.BOT.DAMAGE; updateUI();
                        if (playerHp <= 0) die();
                    }
                }
            }
        }

        // --- MECÂNICA ---
        function handleShoot() {
            if (isReloading || gameState !== 'PLAYING' || ammo <= 0) {
                if (ammo <= 0 && !isReloading) reload();
                return;
            }
            const w = STATS.PLAYER.WEAPONS[weapon];
            if (Date.now() - lastShot < w.RATE) return;

            lastShot = Date.now(); ammo--; updateUI();

            // Recoil Visual
            recoilGroup.rotation.x += 0.08;
            weaponGroup.position.z += 0.15;
            setTimeout(() => { recoilGroup.rotation.x = 0; weaponGroup.position.z = 0; }, 60);

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);

            const wallHits = ray.intersectObjects(scene.children, true).filter(h => h.object.type === 'Mesh' && h.object.parent !== camera);
            const firstWall = wallHits.find(h => obstacleBoxes.some(box => box.containsPoint(h.point)));
            const wallDist = firstWall ? firstWall.distance : Infinity;

            bots.forEach(b => {
                if (b.group.visible) {
                    const hit = ray.intersectObject(b.group, true);
                    if (hit.length > 0 && hit[0].distance < wallDist) {
                        b.hp -= w.DAMAGE;
                        document.getElementById('bot-health-fill').style.width = b.hp + '%';
                        if (b.hp <= 0) {
                            b.group.visible = false; coins += 60;
                            updateUI(); checkVictory();
                        }
                    }
                }
            });
        }

        function reload() {
            if (isReloading || reserve <= 0) return;
            isReloading = true;
            document.getElementById('reload-msg').innerText = "RECARREGANDO...";
            setTimeout(() => {
                const w = STATS.PLAYER.WEAPONS[weapon];
                const need = w.MAG - ammo;
                const load = Math.min(need, reserve);
                ammo += load; reserve -= load;
                isReloading = false;
                document.getElementById('reload-msg').innerText = "";
                updateUI();
            }, STATS.PLAYER.RELOAD_TIME);
        }

        function updateUI() {
            document.getElementById('player-health-fill').style.width = Math.max(0, playerHp) + '%';
            document.getElementById('coin-count').innerText = coins;
            document.getElementById('ammo-count').innerText = ammo;
            document.getElementById('reserve-display').innerText = reserve;
        }

        function checkVictory() {
            if (bots.every(b => !b.group.visible)) {
                gameState = 'VICTORY';
                document.getElementById('victory-overlay').classList.remove('hidden');
                controls.unlock();
            }
        }

        function die() {
            gameState = 'GAMEOVER';
            document.getElementById('game-over-overlay').classList.remove('hidden');
            controls.unlock();
        }

        // --- LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            if (gameState === 'PLAYING') {
                const mv = new THREE.Vector3();
                const q = camera.quaternion.clone();
                const f = new THREE.Vector3(0, 0, -1).applyQuaternion(q);
                const r = new THREE.Vector3(1, 0, 0).applyQuaternion(q);
                f.y = 0; r.y = 0; f.normalize(); r.normalize();

                if (keys['KeyW']) mv.add(f); if (keys['KeyS']) mv.sub(f);
                if (keys['KeyA']) mv.sub(r); if (keys['KeyD']) mv.add(r);

                if (mv.length() > 0) {
                    const next = camera.position.clone().add(mv.normalize().multiplyScalar(STATS.PLAYER.SPEED));
                    const pBox = new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(1, 2, 1));
                    if (!obstacleBoxes.some(b => b.intersectsBox(pBox))) camera.position.copy(next);
                }

                if (isMouseDown && STATS.PLAYER.WEAPONS[weapon].AUTO) handleShoot();
                bots.forEach(b => b.update());

                // Idle Animation
                weaponGroup.position.y = Math.sin(Date.now() * 0.005) * 0.01;
            }
            renderer.render(scene, camera);
        }

        // --- CONTROLES ---
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Digit1') { weapon = 'MAGNUM'; ammo = 10; reserve = 30; updateWeaponModel(); updateUI(); }
            if (e.code === 'Digit2' && ammo === 10) { // Simula desbloqueio preliminar ou troca
                weapon = 'RIFLE'; ammo = 20; reserve = 60; updateWeaponModel(); updateUI();
            }
            if (e.code === 'KeyR') reload();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { isMouseDown = true; handleShoot(); });
        window.addEventListener('mouseup', () => isMouseDown = false);

        document.getElementById('start-btn').onclick = () => {
            gameState = 'PLAYING';
            document.getElementById('start-overlay').classList.add('hidden');
            camera.position.set(0, 1.7, 10);
            controls.lock();
            if (bots.length === 0) bots.push(new Bot());
        };

        document.getElementById('shop-btn').onclick = () => {
            if (coins >= 50) {
                coins -= 50; weapon = 'RIFLE'; ammo = 20; reserve = 60;
                updateWeaponModel(); updateUI();
                document.getElementById('victory-overlay').classList.add('hidden');
                location.reload(); // Reinicia com a nova arma
            }
        };

        // --- INICIAR ---
        initMap();
        updateWeaponModel();
        loop();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
